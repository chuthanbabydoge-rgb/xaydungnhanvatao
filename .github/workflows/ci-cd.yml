name: AITAONHANVATAO CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install tools
        run: pip install ruff black mypy
      - name: Install shared package
        run: pip install -e packages/shared-python/
      - name: Ruff
        run: ruff check src/ --output-format=github
      - name: Black
        run: black --check src/ --extend-exclude="docs/"

  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install deps
        run: |
          pip install -e packages/shared-python/
          pip install -r requirements.txt
          pip install email-validator pytest pytest-asyncio pytest-cov
      - name: Run unit tests
        run: pytest tests/unit/ -v --cov=src/services --cov-report=xml

  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - brain
          - conversation
          - character
          - animation
          - auth
          - avatar
          - world
          - social
          - memory
          - physics
          - scheduler
          - plugin
          - user
          - vision
          - vision_memory
          - llm
          - emotion
          - learning
          - motivation
          - reflection
          - stt
          - tts
          - multi_agent
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/Dockerfile.${{ matrix.service }}
          push: false
          tags: ai-companion-${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
