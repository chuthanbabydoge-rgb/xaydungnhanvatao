      - RABBITMQ_URL=amqp://admin:admin@rabbitmq:5672
    networks:
      - ai-companion-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      llm_service:
        condition: service_started
      memory_service:
        condition: service_started
    restart: unless-stopped

networks:
  ai-companion-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  mongodb_data:
  qdrant_data:
  neo4j_data:
  rabbitmq_data:
