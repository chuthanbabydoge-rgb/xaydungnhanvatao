events {
    worker_connections 1024;
}

http {
    upstream auth_service {
        server auth_service:8011;
    }

    upstream user_service {
        server user_service:8012;
    }

    upstream llm_service {
        server llm_service:8001;
    }

    upstream memory_service {
        server memory_service:8002;
    }

    upstream conversation_service {
        server conversation_service:8003;
    }

    upstream emotion_service {
        server emotion_service:8004;
    }

    upstream motivation_service {
        server motivation_service:8005;
    }

    upstream reflection_service {
        server reflection_service:8006;
    }

    upstream learning_service {
        server learning_service:8007;
    }

    upstream plugin_service {
        server plugin_service:8008;
    }

    upstream scheduler_service {
        server scheduler_service:8009;
    }

    upstream vision_memory_service {
        server vision_memory_service:8010;
    }

    upstream asset_service {
        server asset_service:8013;
    }

    upstream world_service {
        server world_service:8014;
    }

    upstream physics_service {
        server physics_service:8015;
    }

    upstream character_service {
        server character_service:8016;
    }

    upstream animation_service {
        server animation_service:8017;
    }

    upstream vision_service {
        server vision_service:8018;
    }

    upstream stt_service {
        server stt_service:8019;
    }

    upstream tts_service {
        server tts_service:8020;
    }

    upstream social_service {
        server social_service:8021;
    }

    upstream multi_agent_service {
        server multi_agent_service:8022;
    }

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    server {
        listen 80;
        server_name localhost;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;

        # Client body size limit
        client_max_body_size 10M;

        # Timeouts
        client_body_timeout 12;
        client_header_timeout 12;
        keepalive_timeout 15;
        send_timeout 10;

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # Auth Service Routes
        location /api/auth/ {
            limit_req zone=api_limit burst=20 nodelay;
            limit_conn conn_limit 10;
            
            proxy_pass http://auth_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            proxy_connect_timeout 5s;
            proxy_send_timeout 10s;
            proxy_read_timeout 10s;
        }

        # User Service Routes
        location /api/users/ {
            limit_req zone=api_limit burst=20 nodelay;
            limit_conn conn_limit 10;
            
            proxy_pass http://user_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            proxy_connect_timeout 5s;
            proxy_send_timeout 10s;
            proxy_read_timeout 10s;
        }

        # LLM Service Routes
        location /api/llm/ {
            limit_req zone=api_limit burst=5 nodelay;
            limit_conn conn_limit 5;
            
            proxy_pass http://llm_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            proxy_connect_timeout 30s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Memory Service Routes
        location /api/memory/ {
            limit_req zone=api_limit burst=20 nodelay;
