[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "aitaonhanvatao-shared"
version = "0.1.0"
description = "Shared libraries for AITAONHANVATAO services"
requires-python = ">=3.10"
dependencies = [
    "psycopg2-binary>=2.9",
    "redis>=5.0",
    "pymongo>=4.6",
    "qdrant-client>=1.7",
    "neo4j>=5.14",
    "pydantic>=2.5",
    "pydantic-settings>=2.1",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["shared*"]
