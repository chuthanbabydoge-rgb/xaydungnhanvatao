apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ai-pipeline

resources:
  - namespace.yaml
  - rabbitmq.yaml
  - neo4j.yaml
  - jaeger.yaml
  - prometheus.yaml
  - grafana.yaml
  - camera-service.yaml
  - vision-service.yaml
  - world-graph-service.yaml
  - reasoning-service.yaml
  - llm-service.yaml
  - animation-service.yaml
  - voice-service.yaml
  - avatar-service.yaml
  - unity-service.yaml
  - ar-service.yaml

commonLabels:
  app: ai-character-pipeline
  environment: production
