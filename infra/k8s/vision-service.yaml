apiVersion: v1
kind: ConfigMap
metadata:
  name: vision-service-config
  namespace: ai-pipeline
data:
  RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
  JAEGER_HOST: jaeger
  JAEGER_PORT: "6831"
  METRICS_PORT: "8002"
  ENABLE_TRACING: "true"
  ENABLE_METRICS: "true"
  DEVICE: cuda
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vision-service
  namespace: ai-pipeline
  labels:
    app: vision-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vision-service
  template:
    metadata:
      labels:
        app: vision-service
    spec:
      containers:
      - name: vision-service
        image: vision-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
          name: api
        - containerPort: 8002
          name: metrics
        env:
        - name: RABBITMQ_URL
          valueFrom:
            configMapKeyRef:
              name: vision-service-config
              key: RABBITMQ_URL
        - name: JAEGER_HOST
          valueFrom:
            configMapKeyRef:
              name: vision-service-config
              key: JAEGER_HOST
        - name: JAEGER_PORT
          valueFrom:
            configMapKeyRef:
              name: vision-service-config
              key: JAEGER_PORT
        - name: METRICS_PORT
          valueFrom:
            configMapKeyRef:
              name: vision-service-config
              key: METRICS_PORT
        - name: ENABLE_TRACING
          valueFrom:
            configMapKeyRef:
              name: vision-service-config
              key: ENABLE_TRACING
        - name: ENABLE_METRICS
          valueFrom:
            configMapKeyRef:
              name: vision-service-config
              key: ENABLE_METRICS
        - name: DEVICE
          valueFrom:
            configMapKeyRef:
              name: vision-service-config
              key: DEVICE
        resources:
          requests:
            memory: "2Gi"
            cpu: "1000m"
            nvidia.com/gpu: 1
          limits:
            memory: "4Gi"
            cpu: "2000m"
            nvidia.com/gpu: 1
        livenessProbe:
          httpGet:
            path: /status
            port: 8000
          initialDelaySeconds: 60
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /status
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: vision-service
  namespace: ai-pipeline
spec:
  selector:
    app: vision-service
  ports:
  - port: 8000
    name: api
  - port: 8002
    name: metrics
