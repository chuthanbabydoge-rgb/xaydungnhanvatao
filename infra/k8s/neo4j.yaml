apiVersion: v1
kind: ConfigMap
metadata:
  name: neo4j-config
  namespace: ai-pipeline
data:
  NEO4J_AUTH: neo4j/password
  NEO4J_PLUGINS: '["apoc"]'
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: neo4j
  namespace: ai-pipeline
  labels:
    app: neo4j
spec:
  replicas: 1
  selector:
    matchLabels:
      app: neo4j
  template:
    metadata:
      labels:
        app: neo4j
    spec:
      containers:
      - name: neo4j
        image: neo4j:5.14.0
        ports:
        - containerPort: 7474
          name: http
        - containerPort: 7687
          name: bolt
        env:
        - name: NEO4J_AUTH
          valueFrom:
            configMapKeyRef:
              name: neo4j-config
              key: NEO4J_AUTH
        - name: NEO4J_PLUGINS
          valueFrom:
            configMapKeyRef:
              name: neo4j-config
              key: NEO4J_PLUGINS
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /
            port: 7474
          initialDelaySeconds: 30
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /
            port: 7474
          initialDelaySeconds: 10
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: neo4j
  namespace: ai-pipeline
spec:
  selector:
    app: neo4j
  ports:
  - port: 7474
    name: http
  - port: 7687
    name: bolt
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: neo4j-pvc
  namespace: ai-pipeline
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
