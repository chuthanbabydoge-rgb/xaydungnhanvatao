apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: ai-pipeline
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
    
    scrape_configs:
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']
      
      - job_name: 'camera-service'
        static_configs:
          - targets: ['camera-service:8001']
      
      - job_name: 'vision-service'
        static_configs:
          - targets: ['vision-service:8002']
      
      - job_name: 'world-graph-service'
        static_configs:
          - targets: ['world-graph-service:8003']
      
      - job_name: 'reasoning-service'
        static_configs:
          - targets: ['reasoning-service:8004']
      
      - job_name: 'llm-service'
        static_configs:
          - targets: ['llm-service:8005']
      
      - job_name: 'animation-service'
        static_configs:
          - targets: ['animation-service:8006']
      
      - job_name: 'voice-service'
        static_configs:
          - targets: ['voice-service:8007']
      
      - job_name: 'avatar-service'
        static_configs:
          - targets: ['avatar-service:8008']
      
      - job_name: 'unity-service'
        static_configs:
          - targets: ['unity-service:8009']
      
      - job_name: 'ar-service'
        static_configs:
          - targets: ['ar-service:8010']
      
      - job_name: 'memory-agent'
        static_configs:
          - targets: ['memory-agent:8091']
      
      - job_name: 'emotion-agent'
        static_configs:
          - targets: ['emotion-agent:8092']
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: ai-pipeline
  labels:
    app: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
      - name: prometheus
        image: prom/prometheus:latest
        ports:
        - containerPort: 9090
          name: web
        args:
          - '--config.file=/etc/prometheus/prometheus.yml'
          - '--storage.tsdb.path=/prometheus'
          - '--web.console.libraries=/usr/share/prometheus/console_libraries'
          - '--web.console.templates=/usr/share/prometheus/consoles'
        volumeMounts:
        - name: config
          mountPath: /etc/prometheus
        - name: storage
          mountPath: /prometheus
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
      volumes:
      - name: config
        configMap:
          name: prometheus-config
      - name: storage
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: ai-pipeline
spec:
  selector:
    app: prometheus
  ports:
  - port: 9090
    name: web
