apiVersion: v1
kind: ConfigMap
metadata:
  name: camera-service-config
  namespace: ai-pipeline
data:
  RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
  JAEGER_HOST: jaeger
  JAEGER_PORT: "6831"
  METRICS_PORT: "8001"
  ENABLE_TRACING: "true"
  ENABLE_METRICS: "true"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: camera-service
  namespace: ai-pipeline
  labels:
    app: camera-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: camera-service
  template:
    metadata:
      labels:
        app: camera-service
    spec:
      containers:
      - name: camera-service
        image: camera-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
          name: api
        - containerPort: 8001
          name: metrics
        env:
        - name: RABBITMQ_URL
          valueFrom:
            configMapKeyRef:
              name: camera-service-config
              key: RABBITMQ_URL
        - name: JAEGER_HOST
          valueFrom:
            configMapKeyRef:
              name: camera-service-config
              key: JAEGER_HOST
        - name: JAEGER_PORT
          valueFrom:
            configMapKeyRef:
              name: camera-service-config
              key: JAEGER_PORT
        - name: METRICS_PORT
          valueFrom:
            configMapKeyRef:
              name: camera-service-config
              key: METRICS_PORT
        - name: ENABLE_TRACING
          valueFrom:
            configMapKeyRef:
              name: camera-service-config
              key: ENABLE_TRACING
        - name: ENABLE_METRICS
          valueFrom:
            configMapKeyRef:
              name: camera-service-config
              key: ENABLE_METRICS
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /status
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /status
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: camera-service
  namespace: ai-pipeline
spec:
  selector:
    app: camera-service
  ports:
  - port: 8000
    name: api
  - port: 8001
    name: metrics
